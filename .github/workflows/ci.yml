name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify registry signatures
        run: npm run audit:signatures

      - name: Build
        run: npm run build

      - name: Quality gate (typecheck, unit tests, coverage threshold)
        run: npm run quality:check

      - name: Pack dry run
        run: npm run pack:dry
