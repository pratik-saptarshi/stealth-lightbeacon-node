image: node:20

pipelines:
  custom:
    stealth-lightbeacon-audit:
      - step:
          name: Run Security and AEO/GEO Site Audit
          caches:
            - node
          script:
            - pnpm install --frozen-lockfile
            - pnpm run build
            - pnpm exec stealth-lightbeacon audit "https://example.com" --depth 1 --max-urls 5 --format both --output-dir ./audit-results
          artifacts:
            - audit-results/**
  default:
    - step:
        name: Build and check signatures
        caches:
          - node
        script:
          - pnpm install --frozen-lockfile
          - pnpm run build
          - pnpm run quality:check
